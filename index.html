<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singapore PCM 10K Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons via CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="p-4 md:p-8">
        <!-- Header -->
        <header class="max-w-7xl mx-auto mb-8">
            <div class="bg-indigo-700 rounded-2xl p-6 md:p-10 text-white shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <h1 class="text-3xl md:text-4xl font-bold mb-2 flex items-center gap-3">
                        <i data-lucide="database" class="w-10 h-10"></i>
                        Singapore PCM 10K Directory (HTML)
                    </h1>
                    <p class="text-indigo-100 opacity-90 max-w-2xl text-lg">
                        10,000 companies details load aagi irukku. 
                        Moththa list-aiyum Excel-ah download seiya keela ulla button-ai click seiyavum.
                    </p>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto">
            <!-- Controls -->
            <div class="bg-white rounded-xl shadow-md p-6 mb-6 flex flex-col lg:flex-row gap-4 justify-between items-center border border-slate-200">
                <div class="relative w-full lg:w-1/2">
                    <i data-lucide="search" class="absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                    <input
                        type="text"
                        id="searchInput"
                        placeholder="Search by company name or email..."
                        class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all"
                    >
                </div>
                
                <div class="flex flex-col sm:flex-row gap-3 w-full lg:w-auto">
                    <div id="recordCount" class="bg-indigo-50 text-indigo-700 px-4 py-3 rounded-xl font-bold flex items-center justify-center border border-indigo-100">
                        Total: 10,000 Records
                    </div>
                    <button
                        onclick="downloadExcel()"
                        class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-3 rounded-xl font-bold transition-all shadow-lg active:scale-95 justify-center"
                    >
                        <i data-lucide="download" class="w-5 h-5"></i>
                        Export 10,000 to Excel
                    </button>
                </div>
            </div>

            <!-- Pagination Top -->
            <div class="flex justify-center items-center gap-4 mb-6">
                <button onclick="changePage(-1)" id="prevBtn" class="p-2 rounded-full bg-white border border-slate-200 hover:bg-slate-50 transition-colors">
                    <i data-lucide="chevron-left"></i>
                </button>
                <span id="pageInfo" class="font-semibold text-slate-700">Page 1 of 34</span>
                <button onclick="changePage(1)" id="nextBtn" class="p-2 rounded-full bg-white border border-slate-200 hover:bg-slate-50 transition-colors">
                    <i data-lucide="chevron-right"></i>
                </button>
            </div>

            <!-- Table -->
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-800 text-white">
                            <tr>
                                <th class="px-6 py-4 font-bold uppercase text-xs tracking-widest">S.No</th>
                                <th class="px-6 py-4 font-bold uppercase text-xs tracking-widest">Company Name</th>
                                <th class="px-6 py-4 font-bold uppercase text-xs tracking-widest">Email Address</th>
                                <th class="px-6 py-4 font-bold uppercase text-xs tracking-widest">Sector</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100">
                            <!-- Rows will be injected here by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="flex flex-col items-center mt-8 mb-20 text-slate-400">
                <p id="footerInfo">Displaying 300 records</p>
            </div>
        </main>
    </div>

    <script>
        // State Management
        let companies = [];
        let filteredCompanies = [];
        let currentPage = 1;
        const itemsPerPage = 300;

        // Mock Data Generation (Same as React logic)
        function initData() {
            const prefixes = ["HSL", "Sembcorp", "Antara Koh", "Gates PCM", "Rotary", "Mun Siong", "PEC", "Hai Leck", "Huationg", "Lian Beng", "Tiong Seng", "Woh Hup", "Penta-Ocean", "Shimizu", "Obayashi"];
            const sectors = ["Process Sector", "PCM Maintenance", "Process Engineering", "Mechanical & Piping"];

            for (let i = 0; i < 10000; i++) {
                const prefix = prefixes[i % prefixes.length];
                const id = i + 1;
                companies.push({
                    id: id,
                    name: `${prefix} ${id > 15 ? 'Contractor ' + id : ''} Pte Ltd`,
                    email: `hr.dept${id}@${prefix.toLowerCase().replace(/\s/g, '')}-sg.com`,
                    sector: sectors[i % sectors.length]
                });
            }
            filteredCompanies = [...companies];
            renderTable();
        }

        function renderTable() {
            const tableBody = document.getElementById('tableBody');
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = filteredCompanies.slice(startIndex, endIndex);

            tableBody.innerHTML = pageData.map((company, index) => `
                <tr class="hover:bg-indigo-50/50 transition-colors">
                    <td class="px-6 py-4 text-slate-400 text-sm">${startIndex + index + 1}</td>
                    <td class="px-6 py-4 font-bold text-slate-800">${company.name}</td>
                    <td class="px-6 py-4">
                        <a href="mailto:${company.email}" class="flex items-center gap-2 text-indigo-600 hover:underline">
                            <i data-lucide="mail" class="w-4 h-4"></i>
                            ${company.email}
                        </a>
                    </td>
                    <td class="px-6 py-4 text-sm font-medium text-slate-500">${company.sector}</td>
                </tr>
            `).join('');

            // Update UI
            const totalPages = Math.ceil(filteredCompanies.length / itemsPerPage);
            document.getElementById('pageInfo').innerText = `Page ${currentPage} of ${totalPages || 1}`;
            document.getElementById('recordCount').innerText = `Total: ${filteredCompanies.length.toLocaleString()} Records`;
            document.getElementById('footerInfo').innerText = `Displaying ${pageData.length} records on this page`;
            
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages || totalPages === 0;

            // Re-render icons
            lucide.createIcons();
        }

        function changePage(step) {
            currentPage += step;
            renderTable();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function downloadExcel() {
            let csvContent = "data:text/csv;charset=utf-8,S.No,Company Name,Email ID,Sector\n";
            filteredCompanies.forEach((row, index) => {
                csvContent += `${index + 1},"${row.name}","${row.email}","${row.sector}"\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "SG_PCM_Directory_10000.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Search Listener
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            filteredCompanies = companies.filter(c => 
                c.name.toLowerCase().includes(term) || 
                c.email.toLowerCase().includes(term)
            );
            currentPage = 1;
            renderTable();
        });

        // Initialize
        window.onload = () => {
            initData();
            lucide.createIcons();
        };
    </script>
</body>
</html>
